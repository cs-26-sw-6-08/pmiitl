- light:
  - default_entity_id: light.kitchen_light
    name: kitchen_light
    unique_id: kitchen_light
    state: "{{ states('input_boolean.kitchen_light') == 'on' }}"
    level: "{{ states('input_number.kitchen_light_brightness') | int }}"
    temperature: "{{ states('input_number.kitchen_light_color_temp') | int }}"
    turn_on:
      - action: input_boolean.turn_on
        target:
          entity_id: input_boolean.kitchen_light
    turn_off:
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.kitchen_light
    set_level:
      - action: input_number.set_value
        data:
          value: "{{ brightness }}"
          entity_id: input_number.kitchen_light_brightness
    set_temperature:
      - action: input_number.set_value
        data:
          value: "{{ color_temp }}"
          entity_id: input_number.kitchen_light_color_temp
- light:
  - default_entity_id: light.living_room_light
    name: living_room_light
    unique_id: living_room_light
    state: "{{ states('input_boolean.living_room_light') == 'on' }}"
    turn_on:
      - action: input_boolean.turn_on
        target:
          entity_id: input_boolean.living_room_light
    turn_off:
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.living_room_light

- vacuum:
  - default_entity_id: vacuum.living_room_roomba
    unique_id: living_room_roomba
    name: roomba
    state: >
      {% if is_state('input_boolean.living_room_roomba_state', 'on') %}
        cleaning
      {% else %}
        docked
      {% endif %}
    return_to_base:
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.living_room_roomba_state
    start:
      - action: input_boolean.turn_on
        target:
          entity_id: input_boolean.living_room_roomba_state
