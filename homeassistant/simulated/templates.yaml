#https://www.billigvvs.dk/philips-hue-white-color-ambiance-e27-standardpaere-2000k-6500k-65w-2-pak-2712789
- sensor:
  - unit_of_measurement: W
    device_class: power
    default_entity_id: sensor.kitchen_light_wattage
    name: kitchen_light
    state: >
      {% set p_max = 6.5 %}
      {% set p_standby = 0.5 %}

      {% set brightness = state_attr('light.kitchen_light', 'brightness') | float(0) %}
      {% set color_temp = state_attr('light.kitchen_light', 'color_temp') | float(250) %}
      {% set b_ratio = brightness / 255 %}
      {% set temp_mod = 1 - 0.15 * ((color_temp - 250) / 250)**2 %}

      {% if is_state('input_boolean.kitchen_light', 'on') %}
        {{ (p_standby + (b_ratio * (p_max - p_standby) * temp_mod)) | round(2) }}
      {% else %}
        {{ p_standby }}
      {% endif %}
# Wattage here below is based on living room light being 4x12W modern LEDs, each having standby off 0.5W (2W)
- sensor:
  - unit_of_measurement: W
    device_class: power
    default_entity_id: sensor.living_room_light_wattage
    name: living_room_light
    state: >
      {% if is_state('input_boolean.living_room_light', 'on') %}
        {{ 4 * 12 }}
      {% else %}
        {{ 4 * 0.5 }}
      {% endif %}
- sensor: #Assumption values
  - unit_of_measurement: W
    device_class: power
    default_entity_id: sensor.kitchen_fridge_wattage
    name: fridge
    state: >
      {% set fridge_temp = states('input_number.kitchen_fridge_temperature') | int(0) %}
      {% set wattage_map = {
        7: 32,
        6: 36,
        5: 39,
        4: 43,
        3: 47,
        2: 52,
        1: 57
      } %}
      {{ wattage_map.get(fridge_temp, 0) }}

